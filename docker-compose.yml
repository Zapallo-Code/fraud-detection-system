services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - mlops-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:29092 1 30 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - mlops-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mlops-net

  kafka-ui:
    image: provectus/kafka-ui:v0.7.2
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - mlops-net

  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${TIMESCALE_USER}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
      POSTGRES_DB: ${TIMESCALE_DB}
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER} -d ${TIMESCALE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - mlops-net

  postgresql:
    image: postgres:16.2
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - mlops-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
    command:
      - mlflow
      - server
      - --backend-store-uri
      - ${MLFLOW_BACKEND_STORE_URI}
      - --default-artifact-root
      - /mlflow/artifacts
      - --host
      - 0.0.0.0
      - --port
      - "5000"
    volumes:
      - mlflow-data:/mlflow/artifacts
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:5000\", timeout=3)' || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mlops-net

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    command: ["airflow", "webserver"]
    volumes:
      - airflow-logs:/opt/airflow/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8080/health\", timeout=3)' || exit 1",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - mlops-net

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    command: ["airflow", "scheduler"]
    volumes:
      - airflow-logs:/opt/airflow/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\" || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - mlops-net

  fastapi:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TIMESCALE_USER: ${TIMESCALE_USER}
      TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD}
      TIMESCALE_DB: ${TIMESCALE_DB}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
      KAFKA_BROKER_URL: ${KAFKA_BROKER_URL}
    networks:
      - mlops-net

  producer:
    build:
      context: .
      dockerfile: docker/kafka/Dockerfile
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER_URL: ${KAFKA_BROKER_URL}
    networks:
      - mlops-net

  grafana:
    build:
      context: .
      dockerfile: docker/grafana/Dockerfile
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_TIMESCALEDB_USER: ${TIMESCALE_USER}
      GF_TIMESCALEDB_PASSWORD: ${TIMESCALE_PASSWORD}
      GF_TIMESCALEDB_DB: ${TIMESCALE_DB}
      GF_POSTGRES_USER: ${POSTGRES_USER}
      GF_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GF_POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - mlops-net

networks:
  mlops-net:
    driver: bridge

volumes:
  postgres-data:
  timescale-data:
  mlflow-data:
  grafana-data:
  airflow-logs:
